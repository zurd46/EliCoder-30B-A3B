base_model: Qwen/Qwen3-Coder-30B-A3B-Instruct
load_in_4bit: true

lora:
  r: 64
  alpha: 128
  dropout: 0.0
  # Agentik: MoE-Router + Expert-Projektionen müssen adaptierbar sein,
  # sonst lernt das Modell keine neuen Tool-Routing-Entscheidungen.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_rslora: true
  # Bei target_modules inkl. gate_proj/up_proj/down_proj MUSS das TRUE sein,
  # sonst shape-mismatched LoRA mit dem MoE-Forward (Tensor 2048 vs 768 Crash).
  # Unsloth-spezifisches Flag — wird in 02_sft.py an get_peft_model() gereicht.
  finetune_all_experts: true

training:
  dataset: zurd46/EliCoder-Dataset-SFT
  split: train
  # 4096 ist das Minimum, damit realistische Tool-Call-Traces
  # (System + Tool-Schema + mehrere Tool-Calls + Results) reinpassen.
  # Unter 4k trainiert man nur Short-Coding, keine Agentik.
  max_seq_length: 4096
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 64
  learning_rate: 2.0e-5
  lr_scheduler_type: cosine
  warmup_steps: 16
  weight_decay: 0.01
  optim: adamw_8bit
  bf16: true
  gradient_checkpointing: true
  logging_steps: 20
  save_strategy: steps
  save_steps: 20
  save_total_limit: 2
  seed: 42
  dataset_num_proc: 8
  packing: true
  remove_unused_columns: false
  dataloader_pin_memory: false
  # Eval-Split hilft zu erkennen ob bei 2 Epochen noch Fortschritt oder Overfit
  eval_fraction: 0.01
  eval_strategy: steps
  eval_steps: 100
  per_device_eval_batch_size: 1
  eval_accumulation_steps: 2

output:
  hf_repo: zurd46/EliCoder-30B-A3B-LoRA-SFT
  local_dir: /workspace/lora-sft
