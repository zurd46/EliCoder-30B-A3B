base_model: Qwen/Qwen3-Coder-30B-A3B-Instruct
load_in_4bit: true

lora:
  r: 64
  alpha: 128
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  use_rslora: true
  finetune_all_experts: false

training:
  dataset: zurd46/EliCoder-Dataset-SFT
  split: train
  max_seq_length: 6144
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 64
  learning_rate: 2.0e-5
  lr_scheduler_type: cosine
  warmup_steps: 100
  weight_decay: 0.01
  optim: adamw_8bit
  bf16: true
  gradient_checkpointing: false
  logging_steps: 10
  save_strategy: steps
  save_steps: 100
  save_total_limit: 3
  seed: 42
  dataset_num_proc: 8
  packing: true
  remove_unused_columns: false
  eval_strategy: "no"
  dataloader_pin_memory: false

output:
  hf_repo: zurd46/EliCoder-30B-A3B-LoRA-SFT
  local_dir: /workspace/lora-sft
