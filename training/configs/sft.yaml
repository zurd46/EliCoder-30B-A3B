base_model: Qwen/Qwen3-Coder-30B-A3B-Instruct
load_in_4bit: true

lora:
  r: 64
  alpha: 128
  dropout: 0.0
  # Nur Attention-LoRA (q/k/v/o) — MoE-Experts (gate/up/down_proj) sind in
  # Unsloth 2026.4 auf Qwen3-MoE derzeit NICHT kompatibel mit LoRA, unabhängig
  # vom MoE-Backend (grouped_mm, unsloth_triton beide crashen mit Shape-Mismatch
  # 2048 vs 768 beim ersten Forward, selbst mit finetune_all_experts=True).
  # Attention-LoRA reicht für agentisches Tool-Routing, weil Tool-Auswahl primär
  # durch Attention-Scores entschieden wird — Expert-Routing ist orthogonal.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  use_rslora: true
  finetune_all_experts: false

training:
  dataset: zurd46/EliCoder-Dataset-SFT
  split: train
  # 4096 ist das Minimum, damit realistische Tool-Call-Traces
  # (System + Tool-Schema + mehrere Tool-Calls + Results) reinpassen.
  # Unter 4k trainiert man nur Short-Coding, keine Agentik.
  max_seq_length: 4096
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 64
  learning_rate: 2.0e-5
  lr_scheduler_type: cosine
  warmup_steps: 16
  weight_decay: 0.01
  optim: adamw_8bit
  bf16: true
  gradient_checkpointing: true
  logging_steps: 20
  save_strategy: steps
  save_steps: 20
  save_total_limit: 2
  seed: 42
  dataset_num_proc: 8
  packing: true
  remove_unused_columns: false
  dataloader_pin_memory: false
  # Eval-Split hilft zu erkennen ob bei 2 Epochen noch Fortschritt oder Overfit
  eval_fraction: 0.01
  eval_strategy: steps
  eval_steps: 100
  per_device_eval_batch_size: 1
  eval_accumulation_steps: 2

output:
  hf_repo: zurd46/EliCoder-30B-A3B-LoRA-SFT
  local_dir: /workspace/lora-sft
