base_model: Qwen/Qwen3-Coder-30B-A3B-Instruct
adapter_repo: zurd46/EliCoder-30B-A3B-LoRA-DPO

rope:
  rope_scaling_type: yarn
  rope_scaling_factor: 4.0
  original_max_position_embeddings: 65536
  target_max_position_embeddings: 262144

layer_freeze:
  freeze_until_layer: 30

training:
  dataset: zurd46/EliCoder-Dataset-LongCtx
  split: train
  max_seq_length: 40960
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  optim: paged_adamw_8bit
  bf16: true
  gradient_checkpointing: true
  seed: 42
  save_steps: 50
  save_total_limit: 2
  # 40k seq-len macht Step-Eval zu teuer → einmal am Epochenende
  eval_fraction: 0.02
  eval_strategy: epoch
  per_device_eval_batch_size: 1

output:
  hf_repo: zurd46/EliCoder-30B-A3B-LoRA-LongCtx
  local_dir: /workspace/lora-longctx
