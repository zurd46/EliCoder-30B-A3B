base_model: Qwen/Qwen3-Coder-30B-A3B-Instruct
adapter_repo: zurd46/EliCoder-30B-A3B-LoRA-SFT

training:
  dataset: zurd46/EliCoder-Dataset-DPO
  split: train
  # Agent-DPO: Prompts enthalten das volle <tools>-Schema (JSON) +
  # Query. Tool-Schemas sind oft 1–2k Tokens.
  max_seq_length: 4096
  max_prompt_length: 3072
  beta: 0.05
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate: 2.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  optim: adamw_8bit
  bf16: true
  gradient_checkpointing: false
  logging_steps: 10
  save_steps: 200
  save_total_limit: 2
  seed: 42
  # DPO kann schnell overfitten — Eval hilft Overfit-Detection
  eval_fraction: 0.005
  eval_strategy: steps
  eval_steps: 200
  per_device_eval_batch_size: 1

output:
  hf_repo: zurd46/EliCoder-30B-A3B-LoRA-DPO
  local_dir: /workspace/lora-dpo
